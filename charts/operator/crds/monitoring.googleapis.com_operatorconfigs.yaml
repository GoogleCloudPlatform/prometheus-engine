            properties:
              config:
                description: Settings for the collector configuration propagation.
                properties:
                  compression:
                    description: |-
                      Compression enables compression of the config data propagated by the operator to collectors
                      and the rule-evaluator. It is recommended to use the gzip option when using a large number of
                      ClusterPodMonitoring, PodMonitoring, GlobalRules, ClusterRules, and/or Rules.
                    enum:
                    - none
                    - gzip
                    type: string
                type: object
              targetStatus:
                description: Configuration of target status reporting.
                properties:
                  enabled:
                    description: Enable target status reporting.
                    type: boolean
                type: object
            type: object
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          managedAlertmanager:
            default:
              configSecret:
                key: alertmanager.yaml
                name: alertmanager
            description: ManagedAlertmanager holds information for configuring the
              managed instance of Alertmanager.
            properties:
              configSecret:
                description: |-
                  ConfigSecret refers to the name of a single-key Secret in the public namespace that
                  holds the managed Alertmanager config file.
                properties:
                  key:
                    description: The key of the secret to select from.  Must be a
                      valid secret key.
                    type: string
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              externalURL:
                description: |-
                  ExternalURL is the URL under which Alertmanager is externally reachable (for example, if
                  Alertmanager is served via a reverse proxy). Used for generating relative and absolute
                  links back to Alertmanager itself. If the URL has a path portion, it will be used to
                  prefix all HTTP endpoints served by Alertmanager, otherwise relevant URL components will
                  be derived automatically.

                  If no URL is provided, Alertmanager will point to the Google Cloud Metric Explorer page.
                type: string
              storage:
                description: |-
                  Storage opts the managed Alertmanager into a PersistentVolumeClaim-backed
                  data directory. When unset, Alertmanager uses an ephemeral emptyDir volume
                  and all silences, notification log entries, and inhibitions are lost on
                  pod restart. When set, the operator creates a PVC in the operator
                  namespace and mounts it at the Alertmanager data path so this state
                  survives pod churn.

                  See https://github.com/GoogleCloudPlatform/prometheus-engine/issues/685.
                properties:
                  volumeClaim:
                    description: |-
                      VolumeClaim describes the desired PersistentVolumeClaim. The
                      embedded structure exposes both `metadata` (so callers can attach
                      labels and annotations, e.g. for volume-snapshot tooling) and `spec`
                      (so every Kubernetes PVC field — accessModes, storageClassName,
                      resources, selector, volumeMode, dataSource, dataSourceRef — is
                      configurable). The operator overwrites the claim's name and
                      namespace; everything else is taken from the caller-provided spec
                      modulo Kubernetes-enforced immutability.
                    properties:
                      apiVersion:
                        description: |-
                          APIVersion defines the versioned schema of this representation of an object.
                          Servers should convert recognized schemas to the latest internal value, and
                          may reject unrecognized values.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                        type: string
                      kind:
                        description: |-
                          Kind is a string value representing the REST resource this object represents.
                          Servers may infer this from the endpoint the client submits requests to.
                          Cannot be updated.
                          In CamelCase.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                      metadata:
                        description: |-
                          EmbeddedObjectMetadata contains labels, annotations and finalizers
                          applied to the generated PersistentVolumeClaim. Other ObjectMeta
                          fields are ignored.
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            description: |-
                              Annotations applied to the generated resource. Useful for
                              integrations such as VolumeSnapshot controllers or storage-class
                              provisioners that read annotations from the claim.
                            type: object
                          finalizers:
                            description: |-
                              Finalizers applied to the generated resource on creation. The
                              operator does not strip user-managed finalizers it did not add, so
                              removing entries from this list does not remove them from the live
                              object.
                            items:
                              type: string
                            type: array
                          labels:
                            additionalProperties:
                              type: string
                            description: |-
                              Labels applied to the generated resource. Merged with the
                              operator's default labels; on conflict the operator's value wins.
                            type: object
                        type: object
                      spec:
                        description: |-
                          Spec defines the desired characteristics of the volume. At minimum,
                          `resources.requests.storage` must be set. See the Kubernetes
                          PersistentVolumeClaim documentation for the full field reference:
